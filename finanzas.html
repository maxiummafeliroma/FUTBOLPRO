<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💰 Curso de Finanzas</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root {
    --verde: #00c9a7;
    --azul: #4facfe;
    --amarillo: #ffd700;
    --naranja: #ff6b35;
    --rojo: #ff4757;
    --morado: #a29bfe;
    --bg: #0f0e17;
    --card: #1a1a2e;
    --card2: #16213e;
    --txt: #fffffe;
    --muted: #a7a9be;
    --border: rgba(255,255,255,0.08);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--txt);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== PANTALLA INICIO ===== */
  #pantalla-inicio {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background: linear-gradient(135deg, #0f0e17 0%, #1a1a2e 50%, #16213e 100%);
    position: relative;
    overflow: hidden;
  }

  #pantalla-inicio::before {
    content: '';
    position: absolute;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(0,201,167,0.15) 0%, transparent 70%);
    top: -100px; right: -100px;
    border-radius: 50%;
  }

  #pantalla-inicio::after {
    content: '';
    position: absolute;
    width: 300px; height: 300px;
    background: radial-gradient(circle, rgba(79,172,254,0.12) 0%, transparent 70%);
    bottom: -50px; left: -50px;
    border-radius: 50%;
  }

  .logo-curso {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(36px, 8vw, 64px);
    background: linear-gradient(135deg, var(--verde), var(--azul));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-align: center;
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
  }

  .subtitulo-curso {
    font-size: clamp(14px, 3vw, 18px);
    color: var(--muted);
    text-align: center;
    margin-bottom: 40px;
    position: relative;
    z-index: 1;
  }

  .input-nombre {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 14px 20px;
    font-size: 18px;
    font-family: 'Nunito', sans-serif;
    color: var(--txt);
    width: 100%;
    max-width: 340px;
    margin-bottom: 24px;
    outline: none;
    transition: border-color 0.3s;
    position: relative;
    z-index: 1;
    text-align: center;
  }

  .input-nombre:focus { border-color: var(--verde); }
  .input-nombre::placeholder { color: var(--muted); }

  .label-nivel {
    font-size: 16px;
    font-weight: 700;
    color: var(--muted);
    margin-bottom: 16px;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .nivel-cards {
    display: flex;
    gap: 16px;
    margin-bottom: 32px;
    flex-wrap: wrap;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .nivel-card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 24px 28px;
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
    min-width: 150px;
  }

  .nivel-card:hover { transform: translateY(-4px); }

  .nivel-card.selected-9 {
    border-color: var(--amarillo);
    background: rgba(255,215,0,0.1);
    transform: translateY(-4px);
  }

  .nivel-card.selected-14 {
    border-color: var(--azul);
    background: rgba(79,172,254,0.1);
    transform: translateY(-4px);
  }

  .nivel-emoji { font-size: 40px; margin-bottom: 8px; }
  .nivel-titulo { font-family: 'Fredoka One', cursive; font-size: 22px; margin-bottom: 4px; }
  .nivel-desc { font-size: 12px; color: var(--muted); }

  .btn-empezar {
    background: linear-gradient(135deg, var(--verde), var(--azul));
    border: none;
    border-radius: 50px;
    padding: 16px 48px;
    font-family: 'Fredoka One', cursive;
    font-size: 22px;
    color: white;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    z-index: 1;
    box-shadow: 0 8px 32px rgba(0,201,167,0.3);
  }

  .btn-empezar:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,201,167,0.4); }
  .btn-empezar:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* ===== PANTALLA CURSO ===== */
  #pantalla-curso { display: none; padding: 20px; max-width: 700px; margin: 0 auto; }

  .header-curso {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding: 16px 20px;
    background: var(--card);
    border-radius: 16px;
    border: 1px solid var(--border);
  }

  .saludo-alumno { font-size: 14px; color: var(--muted); }
  .nombre-alumno { font-family: 'Fredoka One', cursive; font-size: 20px; color: var(--verde); }

  .progreso-wrap { flex: 1; margin: 0 20px; }
  .progreso-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; text-align: center; }
  .progreso-bar { background: rgba(255,255,255,0.1); border-radius: 50px; height: 8px; overflow: hidden; }
  .progreso-fill { height: 100%; border-radius: 50px; background: linear-gradient(90deg, var(--verde), var(--azul)); transition: width 0.5s ease; }

  .puntos-display {
    text-align: right;
  }
  .puntos-label { font-size: 11px; color: var(--muted); }
  .puntos-valor { font-family: 'Fredoka One', cursive; font-size: 22px; color: var(--amarillo); }

  /* Módulo */
  .modulo-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 28px;
    margin-bottom: 20px;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: translateY(0); } }

  .modulo-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
  }

  .modulo-icono {
    font-size: 40px;
    width: 60px; height: 60px;
    background: var(--card2);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  .modulo-num { font-size: 11px; font-weight: 700; letter-spacing: 1px; color: var(--muted); }
  .modulo-titulo { font-family: 'Fredoka One', cursive; font-size: 24px; }

  .modulo-contenido {
    font-size: 15px;
    line-height: 1.8;
    color: #d4d4e8;
    margin-bottom: 24px;
  }

  .modulo-contenido h3 {
    font-family: 'Fredoka One', cursive;
    font-size: 18px;
    color: var(--txt);
    margin: 20px 0 8px;
  }

  .modulo-contenido .ejemplo {
    background: var(--card2);
    border-left: 3px solid var(--verde);
    border-radius: 0 12px 12px 0;
    padding: 12px 16px;
    margin: 12px 0;
    font-size: 14px;
  }

  .modulo-contenido .dato {
    background: rgba(255,215,0,0.08);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 12px;
    padding: 12px 16px;
    margin: 12px 0;
    font-size: 14px;
  }

  /* Quiz */
  .quiz-titulo {
    font-family: 'Fredoka One', cursive;
    font-size: 20px;
    margin-bottom: 20px;
    color: var(--amarillo);
  }

  .pregunta-card {
    background: var(--card2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .pregunta-texto { font-size: 15px; font-weight: 700; margin-bottom: 14px; }

  .opciones { display: flex; flex-direction: column; gap: 8px; }

  .opcion {
    background: rgba(255,255,255,0.04);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    cursor: pointer;
    font-size: 14px;
    font-family: 'Nunito', sans-serif;
    color: var(--txt);
    text-align: left;
    transition: all 0.2s;
  }

  .opcion:hover:not(:disabled) { border-color: var(--azul); background: rgba(79,172,254,0.08); }
  .opcion.correcta { border-color: var(--verde); background: rgba(0,201,167,0.15); color: var(--verde); }
  .opcion.incorrecta { border-color: var(--rojo); background: rgba(255,71,87,0.1); color: var(--rojo); }
  .opcion.mostrar-correcta { border-color: var(--verde); background: rgba(0,201,167,0.08); }
  .opcion:disabled { cursor: default; }

  .feedback {
    font-size: 13px;
    margin-top: 10px;
    padding: 10px 14px;
    border-radius: 10px;
    display: none;
  }
  .feedback.ok { background: rgba(0,201,167,0.1); color: var(--verde); display: block; }
  .feedback.fail { background: rgba(255,71,87,0.1); color: var(--rojo); display: block; }

  .btn-siguiente {
    background: linear-gradient(135deg, var(--verde), var(--azul));
    border: none;
    border-radius: 50px;
    padding: 14px 36px;
    font-family: 'Fredoka One', cursive;
    font-size: 18px;
    color: white;
    cursor: pointer;
    transition: all 0.3s;
    margin-top: 20px;
    display: none;
    box-shadow: 0 4px 20px rgba(0,201,167,0.25);
  }
  .btn-siguiente:hover { transform: translateY(-2px); }
  .btn-siguiente.visible { display: block; }

  /* Pantalla final */
  #pantalla-final {
    display: none;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 20px;
    text-align: center;
    background: linear-gradient(135deg, #0f0e17 0%, #1a1a2e 100%);
  }

  .diploma {
    background: linear-gradient(135deg, var(--card), var(--card2));
    border: 2px solid var(--amarillo);
    border-radius: 28px;
    padding: 40px;
    max-width: 500px;
    width: 100%;
    box-shadow: 0 0 60px rgba(255,215,0,0.15);
    animation: fadeIn 0.6s ease;
  }

  .diploma-emoji { font-size: 64px; margin-bottom: 12px; }
  .diploma-titulo { font-family: 'Fredoka One', cursive; font-size: 28px; color: var(--amarillo); margin-bottom: 8px; }
  .diploma-nombre { font-family: 'Fredoka One', cursive; font-size: 36px; color: var(--verde); margin-bottom: 16px; }
  .diploma-puntaje { font-family: 'Fredoka One', cursive; font-size: 48px; color: var(--amarillo); }
  .diploma-subtxt { font-size: 14px; color: var(--muted); margin-top: 8px; }
  .diploma-msg { font-size: 16px; color: var(--txt); margin-top: 20px; line-height: 1.6; }

  .btn-reiniciar {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 50px;
    padding: 12px 32px;
    font-family: 'Fredoka One', cursive;
    font-size: 18px;
    color: var(--txt);
    cursor: pointer;
    margin-top: 24px;
    transition: all 0.3s;
  }
  .btn-reiniciar:hover { border-color: var(--verde); color: var(--verde); }

  .stars { font-size: 32px; margin: 12px 0; }

  @media (max-width: 480px) {
    .header-curso { flex-wrap: wrap; gap: 10px; }
    .progreso-wrap { order: 3; flex: 100%; margin: 0; }
    .modulo-card { padding: 20px; }
  }
</style>
</head>
<body>

<!-- PANTALLA INICIO -->
<div id="pantalla-inicio">
  <div class="logo-curso">💰 FinanzasKids</div>
  <div class="subtitulo-curso">Aprendé a manejar tu dinero desde chico</div>

  <input type="text" class="input-nombre" id="input-nombre" placeholder="¿Cómo te llamás?" maxlength="20">

  <div class="label-nivel">¿Cuántos años tenés?</div>
  <div class="nivel-cards">
    <div class="nivel-card" id="card-9" onclick="seleccionarNivel(9)">
      <div class="nivel-emoji">🌟</div>
      <div class="nivel-titulo" style="color:#ffd700">9 años</div>
      <div class="nivel-desc">Nivel Explorador</div>
    </div>
    <div class="nivel-card" id="card-14" onclick="seleccionarNivel(14)">
      <div class="nivel-emoji">🚀</div>
      <div class="nivel-titulo" style="color:#4facfe">14 años</div>
      <div class="nivel-desc">Nivel Avanzado</div>
    </div>
  </div>

  <button class="btn-empezar" id="btn-empezar" onclick="empezarCurso()" disabled>¡Empezar curso! 🎯</button>
</div>

<!-- PANTALLA CURSO -->
<div id="pantalla-curso">
  <div class="header-curso">
    <div>
      <div class="saludo-alumno">Hola,</div>
      <div class="nombre-alumno" id="display-nombre">—</div>
    </div>
    <div class="progreso-wrap">
      <div class="progreso-label" id="progreso-label">Módulo 1 de 7</div>
      <div class="progreso-bar"><div class="progreso-fill" id="progreso-fill" style="width:0%"></div></div>
    </div>
    <div class="puntos-display">
      <div class="puntos-label">Puntos</div>
      <div class="puntos-valor" id="puntos-display">0</div>
    </div>
  </div>

  <div id="contenido-modulo"></div>
</div>

<!-- PANTALLA FINAL -->
<div id="pantalla-final">
  <div class="diploma">
    <div class="diploma-emoji">🏆</div>
    <div class="diploma-titulo">¡Curso Completado!</div>
    <div style="font-size:14px;color:var(--muted);margin-bottom:8px">Felicitamos a</div>
    <div class="diploma-nombre" id="diploma-nombre">—</div>
    <div class="stars" id="diploma-stars">⭐⭐⭐</div>
    <div class="diploma-puntaje" id="diploma-puntaje">0 pts</div>
    <div class="diploma-subtxt" id="diploma-subtxt">de 105 puntos posibles</div>
    <div class="diploma-msg" id="diploma-msg">¡Excelente trabajo!</div>
  </div>
  <button class="btn-reiniciar" onclick="reiniciar()">🔄 Volver a empezar</button>
</div>

<script>
let nivelSeleccionado = null;
let nombreAlumno = '';
let moduloActual = 0;
let puntosTotal = 0;
let preguntasRespondidas = 0;
let preguntasCorrectas = 0;

const modulos9 = [
  {
    icono: '💵',
    titulo: '¿Qué es el dinero?',
    contenido: `
      <p>El dinero es algo que usamos para comprar cosas que necesitamos o queremos. Pero, ¿sabías que antes no existía el dinero?</p>
      <h3>El trueque 🔄</h3>
      <p>Hace mucho tiempo, si querías pan, tenías que dar algo a cambio, como manzanas o leche. Esto se llamaba <strong>trueque</strong>. El problema era que no siempre la otra persona quería lo que vos tenías.</p>
      <div class="ejemplo">💡 Ejemplo: Si vos tenías manzanas pero necesitabas zapatos, tenías que encontrar a alguien que tuviera zapatos y quisiera manzanas. ¡Muy difícil!</div>
      <h3>El dinero como solución 💡</h3>
      <p>Por eso se inventó el dinero. Con dinero podés comprar cualquier cosa, sin importar lo que tengas para ofrecer.</p>
      <div class="dato">🌍 Dato curioso: En el pasado se usaban conchas de mar, sal y hasta piedras gigantes como dinero. ¡Hoy usamos billetes, monedas y tarjetas!</div>
      <h3>¿De dónde viene el dinero? 🏦</h3>
      <p>El dinero lo genera el Banco Central de cada país. En Argentina lo hace el <strong>Banco Central de la República Argentina</strong>. Los papeles que usamos tienen valor porque todos acordamos que lo tienen.</p>
    `,
    preguntas: [
      { texto: '¿Qué es el trueque?', opciones: ['Intercambiar cosas sin usar dinero', 'Un tipo de moneda', 'Un banco antiguo', 'Una forma de ahorro'], correcta: 0, explicacion: '¡Exacto! El trueque es intercambiar cosas directamente, sin dinero.' },
      { texto: '¿Quién genera el dinero en Argentina?', opciones: ['El presidente', 'El Banco Central', 'Los supermercados', 'Los maestros'], correcta: 1, explicacion: 'El Banco Central de la República Argentina es quien emite los billetes y monedas.' },
      { texto: '¿Por qué se inventó el dinero?', opciones: ['Para hacer colecciones', 'Para que los reyes fueran ricos', 'Para facilitar el intercambio de cosas', 'Para llenar los bancos'], correcta: 2, explicacion: '¡Muy bien! El dinero facilita comprar y vender sin necesitar que la otra persona quiera exactamente lo que vos tenés.' }
    ]
  },
  {
    icono: '🐷',
    titulo: 'El ahorro',
    contenido: `
      <p>Ahorrar es guardar una parte del dinero que recibís para usarlo después. Es como la hormiga del cuento que guardaba comida para el invierno.</p>
      <h3>¿Por qué ahorrar? 🤔</h3>
      <p>Hay muchas razones para ahorrar:</p>
      <p>✅ Para comprar algo que querés mucho pero es caro<br>✅ Para cuando pase algo inesperado<br>✅ Para cuando seas grande tener dinero propio</p>
      <div class="ejemplo">💡 Ejemplo: Si recibís $1.000 de cumpleaños y guardás $500, en dos cumpleaños tendrías $1.000 ahorrados para comprar algo más grande que te guste.</div>
      <h3>La regla del 30% 📏</h3>
      <p>Una regla fácil es ahorrar al menos <strong>30 de cada 100 pesos</strong> que recibís. Si guardás eso cada vez, vas a ver cómo crece tu dinero.</p>
      <div class="dato">🐷 La alcancía es la forma más simple de ahorrar. ¡Pero los bancos te dan más seguridad y a veces te pagan intereses por guardar tu dinero ahí!</div>
    `,
    preguntas: [
      { texto: '¿Qué significa ahorrar?', opciones: ['Gastar todo el dinero', 'Guardar dinero para usar después', 'Pedir prestado', 'Regalar dinero'], correcta: 1, explicacion: '¡Correcto! Ahorrar es guardar una parte para el futuro.' },
      { texto: 'Siguiendo la regla del 30%, si recibís $200, ¿cuánto deberías ahorrar?', opciones: ['$100', '$50', '$60', '$20'], correcta: 2, explicacion: '30% de $200 = $60. ¡Muy bien calculado!' },
      { texto: '¿Cuál de estas NO es una razón para ahorrar?', opciones: ['Para una emergencia', 'Para comprar algo caro', 'Para gastar todo hoy', 'Para el futuro'], correcta: 2, explicacion: 'Gastar todo hoy es lo opuesto al ahorro. El ahorro es pensar en el futuro.' }
    ]
  },
  {
    icono: '📊',
    titulo: 'El presupuesto',
    contenido: `
      <p>Un presupuesto es un plan que hacés para saber cuánto dinero entra y cuánto sale. ¡Es como un mapa de tu dinero!</p>
      <h3>Ingresos y gastos 💸</h3>
      <p><strong>Ingresos</strong> = el dinero que recibís (propina, regalo de cumpleaños, mesada)<br><strong>Gastos</strong> = el dinero que gastás (golosinas, juguetes, paseos)</p>
      <div class="ejemplo">💡 Ejemplo de presupuesto semanal:<br>🟢 Ingresos: $500 de propina<br>🔴 Gastos: $200 en golosinas + $100 en figuritas = $300<br>💰 Lo que te queda: $200 para ahorrar</div>
      <h3>La regla de oro 🥇</h3>
      <p>Los gastos nunca deben ser más que los ingresos. Si gastás más de lo que tenés, eso se llama <strong>déficit</strong> y es un problema.</p>
      <div class="dato">📝 Truco: Anotá en un papel o en el celu todo lo que gastás durante una semana. ¡Te vas a sorprender de cuánto gastás en cosas pequeñas!</div>
    `,
    preguntas: [
      { texto: '¿Qué son los ingresos?', opciones: ['El dinero que gastás', 'El dinero que recibís', 'Las deudas', 'Los ahorros que perdiste'], correcta: 1, explicacion: '¡Exacto! Los ingresos son todo el dinero que entra.' },
      { texto: 'Si recibís $400 y gastás $450, ¿qué pasó?', opciones: ['Ahorraste $50', 'Gastaste más de lo que tenías', 'Todo estuvo perfecto', 'Ganaste $50'], correcta: 1, explicacion: 'Gastaste $50 más de lo que tenías. ¡Eso es un problema que hay que evitar!' },
      { texto: '¿Cómo se llama cuando los gastos son mayores que los ingresos?', opciones: ['Superávit', 'Ahorro', 'Déficit', 'Inversión'], correcta: 2, explicacion: 'Déficit es cuando gastás más de lo que ganás. ¡Hay que evitarlo!' }
    ]
  },
  {
    icono: '⚠️',
    titulo: 'La deuda',
    contenido: `
      <p>Una deuda es cuando le pedís dinero prestado a alguien y prometés devolverlo. A veces hay que pagar un poco más de lo que pediste: eso se llama <strong>interés</strong>.</p>
      <h3>¿Cuándo está bien pedir prestado? ✅</h3>
      <p>Está bien cuando es para algo importante y sabés que vas a poder devolver el dinero. Por ejemplo, si necesitás un libro para el colegio.</p>
      <h3>¿Cuándo NO está bien? ❌</h3>
      <p>No está bien cuando pedís para comprar cosas que no necesitás, o cuando no vas a poder devolver el dinero.</p>
      <div class="ejemplo">💡 Ejemplo: Si pedís $100 prestados y te cobran 10% de interés, tenés que devolver $110. El dinero extra ($10) es el interés.</div>
      <div class="dato">⚠️ Regla importante: Nunca pidas prestado más de lo que podés devolver. Las deudas que no se pagan crecen con el tiempo y se hacen más difíciles de pagar.</div>
    `,
    preguntas: [

      { texto: '¿Cuánto debería tener un fondo de emergencia?', opciones: ['1 semana de gastos', '1 mes de gastos', '3 a 6 meses de gastos', '2 años de gastos'], correcta: 2, explicacion: 'El consenso financiero es tener entre 3 y 6 meses de gastos como fondo de emergencia.' },
      { texto: '¿Cuál es la mayor ventaja financiera de empezar a invertir joven?', opciones: ['Tenés más tiempo libre', 'El tiempo permite que el interés compuesto trabaje más', 'Los bancos dan mejores tasas a los jóvenes', 'No hay ventaja real'], correcta: 1, explicacion: '¡La clave! El tiempo amplifica el interés compuesto. Empezar a los 15 vs 25 puede duplicar el resultado final.' }
    ]
  }
];

let modulos = [];

// ===== SUPABASE =====
const SUPA_URL = 'https://pglmteswkjqiruliyfhx.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBnbG10ZXN3a2pxaXJ1bGl5Zmh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNjcyNzEsImV4cCI6MjA5MDY0MzI3MX0.o1jD0tI9N9y1uOZKzHsfxckHRpYnn_LzS_MuW3vfgpw';

let progresoId = null; // ID del registro en Supabase

async function cargarProgreso(nombre, nivel) {
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/curso_progreso?nombre=eq.${encodeURIComponent(nombre)}&nivel=eq.${nivel}&completado=eq.false&order=updated_at.desc&limit=1`, {
      headers: { 'apikey': SUPA_KEY, 'Authorization': 'Bearer ' + SUPA_KEY }
    });
    const data = await res.json();
    if (data && data.length > 0) {
      return data[0];
    }
    return null;
  } catch(e) { return null; }
}

async function crearProgreso(nombre, nivel) {
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/curso_progreso`, {
      method: 'POST',
      headers: {
        'apikey': SUPA_KEY,
        'Authorization': 'Bearer ' + SUPA_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
      },
      body: JSON.stringify({ nombre, nivel, modulo_actual: 0, puntos_total: 0, completado: false })
    });
    const data = await res.json();
    return data && data[0] ? data[0].id : null;
  } catch(e) { return null; }
}

async function guardarProgreso() {
  if (!progresoId) return;
  try {
    await fetch(`${SUPA_URL}/rest/v1/curso_progreso?id=eq.${progresoId}`, {
      method: 'PATCH',
      headers: {
        'apikey': SUPA_KEY,
        'Authorization': 'Bearer ' + SUPA_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        modulo_actual: moduloActual,
        puntos_total: puntosTotal,
        updated_at: new Date().toISOString()
      })
    });
  } catch(e) {}
}

async function marcarCompletado() {
  if (!progresoId) return;
  try {
    await fetch(`${SUPA_URL}/rest/v1/curso_progreso?id=eq.${progresoId}`, {
      method: 'PATCH',
      headers: {
        'apikey': SUPA_KEY,
        'Authorization': 'Bearer ' + SUPA_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ completado: true, updated_at: new Date().toISOString() })
    });
  } catch(e) {}
}

function seleccionarNivel(nivel) {
  nivelSeleccionado = nivel;
  document.getElementById('card-9').className = 'nivel-card' + (nivel===9?' selected-9':'');
  document.getElementById('card-14').className = 'nivel-card' + (nivel===14?' selected-14':'');
  verificarFormulario();
}

document.getElementById('input-nombre').addEventListener('input', verificarFormulario);

function verificarFormulario() {
  const nombre = document.getElementById('input-nombre').value.trim();
  document.getElementById('btn-empezar').disabled = !(nombre && nivelSeleccionado);
}

async function empezarCurso() {
  const btn = document.getElementById('btn-empezar');
  btn.disabled = true;
  btn.textContent = 'Cargando... ⏳';

  nombreAlumno = document.getElementById('input-nombre').value.trim();
  modulos = nivelSeleccionado === 9 ? modulos9 : modulos14;
  document.getElementById('display-nombre').textContent = nombreAlumno;

  // Buscar progreso existente
  const progreso = await cargarProgreso(nombreAlumno, nivelSeleccionado);
  if (progreso) {
    progresoId = progreso.id;
    moduloActual = progreso.modulo_actual || 0;
    puntosTotal = progreso.puntos_total || 0;
  } else {
    moduloActual = 0;
    puntosTotal = 0;
    progresoId = await crearProgreso(nombreAlumno, nivelSeleccionado);
  }

  document.getElementById('pantalla-inicio').style.display = 'none';
  document.getElementById('pantalla-curso').style.display = 'block';
  renderModulo();
}

function renderModulo() {
  const m = modulos[moduloActual];
  const progreso = ((moduloActual) / modulos.length) * 100;
  document.getElementById('progreso-fill').style.width = progreso + '%';
  document.getElementById('progreso-label').textContent = `Módulo ${moduloActual+1} de ${modulos.length}`;
  document.getElementById('puntos-display').textContent = puntosTotal;

  let preguntasHTML = m.preguntas.map((p, pi) => `
    <div class="pregunta-card" id="pregunta-${pi}">
      <div class="pregunta-texto">❓ ${p.texto}</div>
      <div class="opciones">
        ${p.opciones.map((op, oi) => `
          <button class="opcion" onclick="responder(${pi}, ${oi})" id="op-${pi}-${oi}">${op}</button>
        `).join('')}
      </div>
      <div class="feedback" id="feedback-${pi}"></div>
    </div>
  `).join('');

  document.getElementById('contenido-modulo').innerHTML = `
    <div class="modulo-card">
      <div class="modulo-header">
        <div class="modulo-icono">${m.icono}</div>
        <div>
          <div class="modulo-num">MÓDULO ${moduloActual+1}</div>
          <div class="modulo-titulo">${m.titulo}</div>
        </div>
      </div>
      <div class="modulo-contenido">${m.contenido}</div>
    </div>
    <div class="modulo-card">
      <div class="quiz-titulo">🎯 Evaluación del módulo</div>
      ${preguntasHTML}
      <button class="btn-siguiente" id="btn-siguiente" onclick="siguienteModulo()">
        ${moduloActual < modulos.length-1 ? 'Siguiente módulo ➡️' : '¡Terminar curso! 🏆'}
      </button>
    </div>
  `;

  window.respuestasModulo = new Array(m.preguntas.length).fill(false);
  window.respondidas = 0;
  window.scrollTo(0,0);
}

function responder(pi, oi) {
  const m = modulos[moduloActual];
  const p = m.preguntas[pi];
  const correcta = p.correcta;
  const esCorrecta = oi === correcta;

  // Deshabilitar todas las opciones de esta pregunta
  for(let i=0; i<p.opciones.length; i++) {
    const btn = document.getElementById(`op-${pi}-${i}`);
    btn.disabled = true;
    if(i === correcta) btn.classList.add('mostrar-correcta');
  }

  const btnElegido = document.getElementById(`op-${pi}-${oi}`);
  btnElegido.classList.add(esCorrecta ? 'correcta' : 'incorrecta');

  const feedback = document.getElementById(`feedback-${pi}`);
  feedback.className = `feedback ${esCorrecta ? 'ok' : 'fail'}`;
  feedback.textContent = (esCorrecta ? '✅ ¡Correcto! ' : '❌ Incorrecto. ') + p.explicacion;

  if(esCorrecta && !respuestasModulo[pi]) {
    puntosTotal += 5;
    document.getElementById('puntos-display').textContent = puntosTotal;
    respuestasModulo[pi] = true;
  }

  respondidas++;
  if(respondidas >= m.preguntas.length) {
    document.getElementById('btn-siguiente').classList.add('visible');
    document.getElementById('btn-siguiente').scrollIntoView({behavior:'smooth', block:'nearest'});
  }
}

async function siguienteModulo() {
  moduloActual++;
  await guardarProgreso();
  if(moduloActual >= modulos.length) {
    mostrarFinal();
  } else {
    renderModulo();
  }
}

async function mostrarFinal() {
  await marcarCompletado();
  document.getElementById('pantalla-curso').style.display = 'none';
  const final = document.getElementById('pantalla-final');
  final.style.display = 'flex';

  const max = modulos.length * modulos[0].preguntas.length * 5;
  const pct = puntosTotal / max;
  let stars = '⭐';
  let msg = 'Seguí practicando, vas por buen camino.';
  if(pct >= 0.8) { stars = '⭐⭐⭐'; msg = '¡Excelente! Tenés un futuro financiero brillante por delante. 🚀'; }
  else if(pct >= 0.6) { stars = '⭐⭐'; msg = '¡Muy bien! Ya tenés las bases para manejar bien tu dinero. 💪'; }

  document.getElementById('diploma-nombre').textContent = nombreAlumno;
  document.getElementById('diploma-stars').textContent = stars;
  document.getElementById('diploma-puntaje').textContent = puntosTotal + ' pts';
  document.getElementById('diploma-subtxt').textContent = `de ${max} puntos posibles`;
  document.getElementById('diploma-msg').textContent = msg;
}

function reiniciar() {
  nivelSeleccionado = null;
  nombreAlumno = '';
  moduloActual = 0;
  puntosTotal = 0;
  document.getElementById('pantalla-final').style.display = 'none';
  document.getElementById('pantalla-inicio').style.display = 'flex';
  document.getElementById('input-nombre').value = '';
  document.getElementById('card-9').className = 'nivel-card';
  document.getElementById('card-14').className = 'nivel-card';
  document.getElementById('btn-empezar').disabled = true;
}
</script>
