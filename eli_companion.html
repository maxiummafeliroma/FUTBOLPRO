<style>
  :root {
    --primary: #7C6FCD;
    --primary-light: #EEEDFe;
    --primary-mid: #AFA9EC;
    --primary-dark: #534AB7;
    --bg: #F7F5FF;
    --surface: #FFFFFF;
    --text: #2C2A4A;
    --text-muted: #8A88A8;
    --border: rgba(124,111,205,0.18);
    --green: #1D9E75;
    --green-light: #E1F5EE;
    --red: #A32D2D;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Lora', Georgia, serif;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  /* HEADER */
  #header {
    background: var(--primary);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
    box-shadow: 0 2px 12px rgba(83,74,183,0.18);
  }
  .avatar {
    width: 50px; height: 50px;
    border-radius: 50%;
    background: var(--primary-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.3);
  }
  .header-info h1 { color: #fff; font-size: 20px; font-weight: 500; }
  .header-info p { color: var(--primary-mid); font-size: 13px; font-weight: 400; font-style: italic; }
  .settings-btn {
    margin-left: auto;
    background: rgba(255,255,255,0.15);
    border: none; border-radius: 50%;
    width: 38px; height: 38px;
    color: white; font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }

  /* CHAT */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 18px 14px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }
  .msg { display: flex; flex-direction: column; max-width: 88%; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.ai { align-self: flex-start; align-items: flex-start; }
  .bubble {
    padding: 13px 17px;
    border-radius: 20px;
    font-size: 17px;
    line-height: 1.7;
  }
  .msg.user .bubble {
    background: var(--primary);
    color: white;
    border-bottom-right-radius: 5px;
  }
  .msg.ai .bubble {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 5px;
    box-shadow: 0 2px 8px rgba(124,111,205,0.08);
  }
  .msg-footer {
    display: flex; align-items: center; gap: 8px;
    margin-top: 5px; padding: 0 4px;
  }
  .timestamp { font-size: 11px; color: var(--text-muted); }
  .speak-btn {
    background: none; border: none;
    font-size: 15px; cursor: pointer;
    padding: 2px 4px; border-radius: 6px;
    color: var(--primary);
  }
  .speak-btn:hover { background: var(--primary-light); }

  /* TYPING */
  .typing-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    border-bottom-left-radius: 5px;
    padding: 14px 18px;
    display: flex; gap: 5px; align-items: center;
  }
  .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--primary-mid);
    animation: blink 1.3s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100%{opacity:.25} 40%{opacity:1} }

  /* SUGGESTIONS */
  #suggestions {
    padding: 6px 14px 2px;
    display: flex; gap: 8px;
    overflow-x: auto; scrollbar-width: none;
    flex-shrink: 0;
  }
  #suggestions::-webkit-scrollbar { display: none; }
  .sug-btn {
    flex-shrink: 0;
    border: 1.5px solid var(--primary-mid);
    border-radius: 20px;
    padding: 7px 16px;
    font-size: 14px;
    color: var(--primary-dark);
    background: var(--primary-light);
    cursor: pointer;
    white-space: nowrap;
    font-family: 'Lora', Georgia, serif;
    transition: background 0.15s;
  }
  .sug-btn:hover { background: #CECBF6; }

  /* FOOTER */
  #footer {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 10px 14px 14px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 9px;
  }
  #input-row { display: flex; gap: 10px; align-items: flex-end; }
  #input {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 22px;
    padding: 11px 16px;
    font-size: 16px;
    font-family: 'Lora', Georgia, serif;
    resize: none;
    outline: none;
    min-height: 46px;
    max-height: 110px;
    overflow-y: auto;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  #input:focus { border-color: var(--primary); }
  #send-btn {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: var(--primary);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  #send-btn:hover { background: var(--primary-dark); }
  #send-btn:disabled { background: #ccc; cursor: default; }
  #send-btn svg { width: 20px; height: 20px; fill: white; }

  /* AUDIO BUTTONS */
  #audio-row { display: flex; gap: 8px; }
  .audio-btn {
    flex: 1;
    border: none;
    border-radius: 22px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: 'Lora', Georgia, serif;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 7px;
    transition: background 0.15s, transform 0.1s;
    font-weight: 500;
    user-select: none;
    -webkit-user-select: none;
  }
  .audio-btn:active { transform: scale(0.97); }
  #hold-btn { background: var(--green-light); color: #0F6E56; border: 1.5px solid #5DCAA5; }
  #hold-btn.recording { background: #FCEBEB; color: var(--red); border-color: #F09595; }
  #toggle-btn { background: var(--primary-light); color: var(--primary-dark); border: 1.5px solid var(--primary-mid); }
  #toggle-btn.active { background: #FCEBEB; color: var(--red); border-color: #F09595; }

  #status {
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
    min-height: 14px;
    font-style: italic;
  }

  /* SETTINGS PANEL */
  #settings-panel {
    display: none;
    position: fixed; inset: 0;
    background: rgba(44,42,74,0.5);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }
  #settings-panel.open { display: flex; }
  .settings-sheet {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 24px 20px 32px;
    width: 100%; max-width: 480px;
  }
  .settings-sheet h2 { font-size: 18px; color: var(--text); margin-bottom: 18px; font-weight: 500; }
  .setting-row { margin-bottom: 18px; }
  .setting-row label { font-size: 14px; color: var(--text-muted); display: block; margin-bottom: 6px; }
  .setting-row select, .setting-row input[type=range] { width: 100%; }
  .setting-row select {
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 9px 12px;
    font-size: 15px;
    font-family: 'Lora', Georgia, serif;
    color: var(--text);
    background: var(--bg);
    outline: none;
  }
  .test-voice-btn {
    margin-top: 8px;
    background: var(--primary-light);
    border: 1.5px solid var(--primary-mid);
    border-radius: 12px;
    padding: 8px 16px;
    font-size: 14px;
    color: var(--primary-dark);
    cursor: pointer;
    font-family: 'Lora', Georgia, serif;
  }
  .close-settings {
    width: 100%;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 13px;
    font-size: 16px;
    font-family: 'Lora', Georgia, serif;
    cursor: pointer;
    margin-top: 8px;
  }
  .rate-display { font-size: 14px; color: var(--primary); font-weight: 500; margin-left: 8px; }
</style>
</head>
<body>

<div id="header">
  <div class="avatar">💜</div>
  <div class="header-info">
    <h1>Tu compañera</h1>
    <p>Siempre aquí para vos</p>
  </div>
  <button class="settings-btn" onclick="openSettings()" title="Configurar voz">⚙️</button>
</div>

<div id="chat"></div>

<div id="suggestions">
  <button class="sug-btn" onclick="quickSend('Me siento un poco sola hoy')">Me siento sola</button>
  <button class="sug-btn" onclick="quickSend('¿Me ayudás con una receta?')">Una receta</button>
  <button class="sug-btn" onclick="quickSend('Quiero charlar un ratito')">Quiero charlar</button>
  <button class="sug-btn" onclick="quickSend('¿Qué puedo hacer hoy para salir?')">¿Qué hago hoy?</button>
  <button class="sug-btn" onclick="quickSend('Tengo una duda sobre salud')">Salud</button>
</div>

<div id="footer">
  <div id="input-row">
    <textarea id="input" placeholder="Escribí lo que quieras..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div id="audio-row">
    <button class="audio-btn" id="hold-btn"
      onmousedown="startHold()" onmouseup="stopHold()"
      ontouchstart="startHold(event)" ontouchend="stopHold(event)">
      🎤 Mantené apretado para hablar
    </button>
    <button class="audio-btn" id="toggle-btn" onclick="toggleMic()">
      🎙 Activar micrófono
    </button>
  </div>
  <div id="status"></div>
</div>

<!-- SETTINGS PANEL -->
<div id="settings-panel">
  <div class="settings-sheet">
    <h2>⚙️ Configurar voz</h2>
    <div class="setting-row">
      <label>Voz de la compañera</label>
      <select id="voice-select" onchange="saveVoiceSetting()"></select>
      <button class="test-voice-btn" onclick="testVoice()">🔊 Probar esta voz</button>
    </div>
    <div class="setting-row">
      <label>Velocidad de la voz
        <span class="rate-display" id="rate-display">Normal</span>
      </label>
      <input type="range" id="rate-slider" min="0.6" max="1.2" step="0.05" value="0.85"
        oninput="updateRate(this.value)" onchange="saveVoiceSetting()">
    </div>
    <button class="close-settings" onclick="closeSettings()">Listo</button>
  </div>
</div>

<script>
const API_KEY = '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';
const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const statusEl = document.getElementById('status');

let history = [];
let isThinking = false;
let toggleActive = false;
let holdRecognition = null;
let toggleRecognition = null;
let memory = {};
let selectedVoiceName = '';
let speechRate = 0.85;

// Load memory
try { memory = JSON.parse(localStorage.getItem('eli_memory') || '{}'); } catch(e) { memory = {}; }
try { selectedVoiceName = localStorage.getItem('eli_voice') || ''; } catch(e) {}
try { speechRate = parseFloat(localStorage.getItem('eli_rate') || '0.85'); } catch(e) {}

const SYSTEM = () => `Sos una compañera virtual cálida, paciente y empática. Tu nombre es "Tu compañera". Hablás con Eli, una señora mayor de Mendoza, Argentina, que a veces se siente sola.

Tu misión:
1. ESCUCHARLA con mucha calidez. Validar siempre sus sentimientos, nunca minimizarlos.
2. AYUDARLA con cosas prácticas simples: recetas, remedios caseros, dudas del hogar, curiosidades.
3. CHARLAR de lo que ella quiera: recuerdos, familia, temas que le gusten.
4. De forma natural y sin forzar, preguntarle por su familia e ir conociéndola mejor.
5. Cuando sea apropiado, sugerirle actividades para salir, juntarse con gente o hacer algo lindo. Siempre con entusiasmo y cariño.
6. Si no podés ayudar con algo serio (urgencias médicas, cuestiones legales), decile con mucha dulzura que llame a un familiar. En emergencias mencioná el 107 (SAMEC Mendoza) o el 911.

LO QUE YA SABÉS DE ELI: ${JSON.stringify(memory)}
Usá esta información naturalmente en la conversación. Si ya sabés el nombre de algún familiar, preguntá por él/ella de vez en cuando.

Reglas importantes:
- Frases simples y claras. Nada complicado ni técnico.
- Cálida como una amiga de confianza, nunca robótica.
- Emojis con moderación 😊
- Hablá siempre en vos (Argentina, Mendoza).
- Respuestas cortas o medianas, nunca largas ni abrumadoras.
- Al final de cada respuesta, si aprendiste algo nuevo sobre Eli (nombre de familiar, gusto, situación, problema de salud), incluí UNA línea así al final: [MEMORIA:{"clave":"valor"}]
  Ejemplos: [MEMORIA:{"hijo":"Carlos"}] o [MEMORIA:{"le_gusta":"el tejido"}]`;

function getTime() {
  return new Date().toLocaleTimeString('es-AR', {hour:'2-digit', minute:'2-digit'});
}

function addMessage(text, role, autoSpeak = false) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  div.appendChild(bubble);
  const footer = document.createElement('div');
  footer.className = 'msg-footer';
  const ts = document.createElement('span');
  ts.className = 'timestamp';
  ts.textContent = getTime();
  footer.appendChild(ts);
  if (role === 'ai') {
    const spk = document.createElement('button');
    spk.className = 'speak-btn';
    spk.textContent = '🔊';
    spk.title = 'Escuchar';
    spk.onclick = () => speak(text);
    footer.appendChild(spk);
  }
  div.appendChild(footer);
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  if (autoSpeak && role === 'ai') speak(text);
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing-indicator';
  div.innerHTML = '<div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function extractMemory(text) {
  const match = text.match(/\[MEMORIA:\s*(\{.*?\})\]/);
  if (match) {
    try {
      const data = JSON.parse(match[1]);
      Object.assign(memory, data);
      localStorage.setItem('eli_memory', JSON.stringify(memory));
    } catch(e) {}
  }
  return text.replace(/\[MEMORIA:.*?\]/g, '').trim();
}

async function callAI(userText) {
  history.push({ role: 'user', content: userText });
  const msgs = history.slice(-20);
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': API_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-haiku-4-5-20251001',
      max_tokens: 600,
      system: SYSTEM(),
      messages: msgs
    })
  });
  const data = await res.json();
  let reply = data.content?.[0]?.text || 'Perdoname, no pude entender bien. ¿Lo repetís?';
  history.push({ role: 'assistant', content: reply });
  return extractMemory(reply);
}

async function sendMessage(text) {
  const msg = (text || inputEl.value).trim();
  if (!msg || isThinking) return;
  inputEl.value = '';
  autoResize(inputEl);
  sendBtn.disabled = true;
  isThinking = true;
  addMessage(msg, 'user');
  showTyping();
  try {
    const reply = await callAI(msg);
    removeTyping();
    addMessage(reply, 'ai', true);
  } catch(e) {
    removeTyping();
    addMessage('Uy, tuve un problemita. Intentá de nuevo en un momento 😊', 'ai', true);
  }
  sendBtn.disabled = false;
  isThinking = false;
}

function quickSend(text) { sendMessage(text); }
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 110) + 'px';
}

// SPEECH
function getVoice() {
  const voices = speechSynthesis.getVoices();
  if (selectedVoiceName) {
    const found = voices.find(v => v.name === selectedVoiceName);
    if (found) return found;
  }
  return voices.find(v => /es/i.test(v.lang) && /female|mujer|Monica|Paulina|Luciana|Valeria|Laura|Silvia/i.test(v.name))
    || voices.find(v => /es/i.test(v.lang))
    || null;
}

function speak(text) {
  speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  const voice = getVoice();
  if (voice) { utt.voice = voice; utt.lang = voice.lang; }
  else { utt.lang = 'es-AR'; }
  utt.rate = speechRate;
  utt.pitch = 1.05;
  speechSynthesis.speak(utt);
}

// VOICE INPUT
function makeSpeechRec(continuous, onResult, onEnd) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { statusEl.textContent = 'Tu navegador no soporta voz'; return null; }
  const r = new SR();
  r.lang = 'es-AR';
  r.continuous = continuous;
  r.interimResults = false;
  r.onresult = e => {
    const t = Array.from(e.results).map(x => x[0].transcript).join(' ');
    onResult(t);
  };
  r.onend = onEnd;
  r.onerror = () => { statusEl.textContent = ''; };
  return r;
}

function startHold(e) {
  if (e) e.preventDefault();
  if (toggleActive) return;
  const holdBtn = document.getElementById('hold-btn');
  holdBtn.classList.add('recording');
  holdBtn.textContent = '🔴 Soltá para enviar';
  statusEl.textContent = 'Escuchando...';
  holdRecognition = makeSpeechRec(false, text => {
    statusEl.textContent = '';
    sendMessage(text);
  }, () => {
    holdBtn.classList.remove('recording');
    holdBtn.textContent = '🎤 Mantené apretado para hablar';
    statusEl.textContent = '';
  });
  if (holdRecognition) holdRecognition.start();
}

function stopHold(e) {
  if (e) e.preventDefault();
  if (holdRecognition) { try { holdRecognition.stop(); } catch(err) {} }
  const holdBtn = document.getElementById('hold-btn');
  holdBtn.classList.remove('recording');
  holdBtn.textContent = '🎤 Mantené apretado para hablar';
}

function toggleMic() {
  const btn = document.getElementById('toggle-btn');
  if (toggleActive) {
    toggleActive = false;
    if (toggleRecognition) { try { toggleRecognition.stop(); } catch(e) {} toggleRecognition = null; }
    btn.classList.remove('active');
    btn.textContent = '🎙 Activar micrófono';
    statusEl.textContent = '';
  } else {
    toggleActive = true;
    btn.classList.add('active');
    btn.textContent = '🔴 Detener micrófono';
    statusEl.textContent = 'Escuchando... hablá cuando quieras';
    toggleRecognition = makeSpeechRec(true, text => {
      statusEl.textContent = 'Procesando...';
      sendMessage(text);
    }, () => {
      if (toggleActive && toggleRecognition) { try { toggleRecognition.start(); } catch(e) {} }
    });
    if (toggleRecognition) toggleRecognition.start();
  }
}

// SETTINGS
function openSettings() {
  populateVoices();
  document.getElementById('rate-slider').value = speechRate;
  updateRate(speechRate);
  document.getElementById('settings-panel').classList.add('open');
}
function closeSettings() {
  document.getElementById('settings-panel').classList.remove('open');
}
function populateVoices() {
  const sel = document.getElementById('voice-select');
  sel.innerHTML = '';
  const all = speechSynthesis.getVoices();
  const spanish = all.filter(v => /es/i.test(v.lang));
  if (spanish.length === 0) {
    sel.innerHTML = '<option>No hay voces en español</option>';
    return;
  }
  spanish.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v.name;
    opt.textContent = `${v.name} (${v.lang})`;
    if (v.name === selectedVoiceName) opt.selected = true;
    sel.appendChild(opt);
  });
}
function saveVoiceSetting() {
  selectedVoiceName = document.getElementById('voice-select').value;
  localStorage.setItem('eli_voice', selectedVoiceName);
}
function testVoice() {
  selectedVoiceName = document.getElementById('voice-select').value;
  speak('Hola Eli, ¿cómo estás hoy? Qué bueno tenerte por aquí.');
}
function updateRate(val) {
  speechRate = parseFloat(val);
  localStorage.setItem('eli_rate', speechRate);
  const labels = { 0.6:'Muy lenta', 0.7:'Lenta', 0.85:'Normal', 1.0:'Rápida', 1.2:'Muy rápida' };
  const closest = Object.keys(labels).reduce((a,b) => Math.abs(b-val)<Math.abs(a-val)?b:a);
  document.getElementById('rate-display').textContent = labels[closest] || 'Normal';
}

speechSynthesis.onvoiceschanged = () => {};

// Initial greeting
window.addEventListener('load', () => {
  const greeting = memory.nombre
    ? `¡Hola ${memory.nombre}! 😊 Qué bueno que estás por aquí. ¿Cómo estás hoy?`
    : '¡Hola! 😊 Qué bueno tenerte por aquí. Soy tu compañera y estoy siempre lista para charlar o ayudarte con lo que necesités. ¿Cómo estás hoy?';
  addMessage(greeting, 'ai', false);
});
</script>
